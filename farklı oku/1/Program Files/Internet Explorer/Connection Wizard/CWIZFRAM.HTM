{
	return true;
}
onerror=errortrap;

</HEAD>

<BODY onload="Init();"
	  ONERROR="errortrap();"
	  bgColor=THREEDFACE
	  TABINDEX=-1>


<SCRIPT>
//***************************
//***************************
//*** V A R I A B L E S 

//Set the bld type.
var DEBUG                 = false;
var g_bDownload           = false;
var g_bFontsChecked       = false;
var g_bDownloadComplete   = false;
var g_bLargeFonts         = window.external.IsLargeFonts;
var m_factor              = window.external.fontScaleFactor;;
var YFACTOR               = 600;


if(window.external.BldType())
	DEBUG = true;

function bindObj()
{
	var XFACTOR = "STYLE='position:absolute; top: 0; left:" + YFACTOR +  "; cursor: wait'";

    g_spnLateBindObj.innerHTML = "<OBJECT  ID=g_ObjConnwiz SCROLLING=NO WIDTH=544 HEIGHT=440 type='text/x-scriptlet' data='connwiz.htm'" + XFACTOR +  "ONERROR='errortrap()'></OBJECT>";

	if (g_bLargeFonts)
	{
		g_ObjConnwiz.width=g_objCwizIntro.width * m_factor;
		g_ObjConnwiz.height=g_objCwizIntro.height * m_factor;
	}
}

function doBindingSetup()
{
	//Pass the refs to the ATL-COM objects
	g_ObjConnwiz.setICWSystemConfigSignupOCX   = g_ICWSystemConfig;
	g_ObjConnwiz.setTapiLocationInfoSignupOCX  = g_TapiLocationInfo;
	g_ObjConnwiz.setRegisteredUserInfoOCX      = g_RegisteredUserInfo;
	g_ObjConnwiz.setExternIOleContainer        = window.external;

	//set large fonts and the like
	g_ObjConnwiz.IsLargeFonts    =  window.external.IsLargeFonts;
	g_ObjConnwiz.fontPrecentage  =  window.external.fontScaleFactor;


	g_ObjConnwiz.checkLargeFonts;

	//reset the g_objCwizIntro to it's inital
	//state;
	g_objCwizIntro.reset;


	//flip the debug bit and set the signup server.
	g_ObjConnwiz.setDebug = DEBUG;


	//reset the focus the the next button
	//on this page
	//g_ObjConnwiz.resetFocus;


	g_objCwizIntro.style.posLeft = YFACTOR;
	g_ObjConnwiz.style.posLeft = 0;


	g_objCwizIntro.tabIndex = -1;
	g_ObjConnwiz.tabIndex = 0;

	hide(g_spnBindObj);
	show(g_spnLateBindObj);

	if(DEBUG)
	{
			//set the isppath from debug
			g_ObjConnwiz.setSignupSvr = g_objCwizIntro.ispPath;
			g_ObjConnwiz.setDoDialup  = g_objCwizIntro.DoDialup;
	}


}





// Global scriptlet initialization goes here.
function Init()
{

	if(!DEBUG)
	{

		//CREATE the splash screen

		g_spnBindObj.innerHTML = "<OBJECT  ID=g_objCwizIntro SCROLLING=NO WIDTH=544 HEIGHT=440 type='text/x-scriptlet' data='cwizintr.htm' STYLE='position:absolute; top: 0; left:0' ONERROR='errortrap()' ></OBJECT>";
	}
	else if(DEBUG)
	{
		//CREATE the splash screen

		g_spnBindObj.innerHTML = "<OBJECT  ID=g_objCwizIntro SCROLLING=NO WIDTH=544 HEIGHT=440 type='text/x-scriptlet' data='debug.htm' STYLE='position:absolute; top: 0; left:0' ONERROR='errortrap()' ></OBJECT>";
	}


}

function DoCwizIntroInit()
{
	//Set the focus to the next button
	g_objCwizIntro.resetFocus;

	// Set the product code property in the frame scriptlet, by getting from
	// the container
    g_objCwizIntro.ProdCode                = window.external.GetProductCode;
	g_objCwizIntro.PromoCode               = window.external.GetPromoCode;

	//Pass the refs to the ATL-COM objects
	g_objCwizIntro.setICWSystemConfigOCX   = g_ICWSystemConfig;
	g_objCwizIntro.setTapiLocationInfoOCX  = g_TapiLocationInfo;
	g_objCwizIntro.setExternIOleContainer  = window.external;
		
	if (g_bLargeFonts)
	{
		g_objCwizIntro.width*=m_factor;
		g_objCwizIntro.height*=m_factor;
		YFACTOR*=m_factor;
	}
}

function show(obj)
{
	obj.visibility = "visible";
}


function hide(obj)
{
	obj.visibility = "hidden";
}




</SCRIPT>


<SCRIPT language="javascript" for="g_objCwizIntro" EVENT=onscriptletevent>


    if ((event != null) && (event.srcElement != null) && (event.srcElement.id != "g_btnCancel"))
    {

		if (DEBUG)
			bindObj();


		g_objCwizIntro.style.posLeft = YFACTOR;
		g_ObjConnwiz.style.posLeft = 0;

		g_objCwizIntro.tabIndex = -1;
		g_ObjConnwiz.tabIndex = 0;

		//g_objCwizIntro.disabled = true;
		//g_ObjConnwiz.disabled = false;
		
		hide(g_spnBindObj);
		show(g_spnLateBindObj);


		//reset the focus the the next button
		//on this page
		g_ObjConnwiz.resetFocus;



    }
    else
    {
		if (DEBUG)
        	g_objCwizIntro.setExternIOleContainer        = window.external;
        else {
    		if (!g_bFontsChecked)
    		{
                // First time initialization AFTER the frame object has initialized
                DoCwizIntroInit()

    			//set large fonts and the like
    			g_objCwizIntro.IsLargeFonts   =  window.external.IsLargeFonts;
    			g_objCwizIntro.fontPrecentage =  window.external.fontScaleFactor;

    			g_objCwizIntro.checkLargeFonts;

    			g_bFontsChecked = true;
    		}
    		else
            {
    			if (!g_bDownload)
    			{
    				 bindObj();
    				g_bDownloadComplete = true;

    			}
    			else
    			{
    				g_objCwizIntro.style.posLeft = YFACTOR;
    				g_ObjConnwiz.style.posLeft = 0;


    				g_objCwizIntro.tabIndex = -1;
    				g_ObjConnwiz.tabIndex = 0;

					
    				//g_objCwizIntro.disabled = true;
    				//g_ObjConnwiz.disabled = false;
					

    				hide(g_spnBindObj);
    				show(g_spnLateBindObj);

    				//reset the focus the the next button
    				//on this page
    				g_ObjConnwiz.resetFocus;
    			}

            }
        }
    }



</SCRIPT>


<SCRIPT language="javascript" for="g_ObjConnwiz" EVENT=onscriptletevent>


	if ((event != null) && (event.srcElement != null))
    {
      if  (event.srcElement.id == "g_btnBack")
      {
            g_ObjConnwiz.style.posLeft = YFACTOR;
            g_objCwizIntro.style.posLeft = 0;


				g_objCwizIntro.tabIndex = 0;
				g_ObjConnwiz.tabIndex = -1;

				
    			//g_objCwizIntro.disabled = false;
    			//g_ObjConnwiz.disabled = true;
					


				show(g_spnBindObj);
				hide(g_spnLateBindObj);



			//reset the focus the the next button
			//on this page
			g_objCwizIntro.resetFocus;


		}

    }
    else
    {

			if (g_ObjConnwiz.finish)
            {
                window.external.ICWSuccess;
                window.external.SetICWCompleted;
                window.external.CloseApplication;
            }
			else if (g_ObjConnwiz.checkBindSuccess)
			{
				//***********************
				//** Binding succeeded


				window.setTimeout("doBindingSetup();", 1);


			}
			else
			{
				//***********************
				//** Binding failed

				g_objCwizIntro.bindingFailure;

				//g_spnLateBindObj.innerHTML = "";
				g_bDownloadComplete = false;


				if(DEBUG)
				{
					g_objCwizIntro.style.posLeft = 0;
					g_ObjConnwiz.style.posLeft = YFACTOR;


					g_objCwizIntro.tabIndex = 0;
					g_ObjConnwiz.tabIndex = -1;

					
    				//g_objCwizIntro.disabled = false;
    				//g_ObjConnwiz.disabled = true;
				

					show(g_spnBindObj);
					hide(g_spnLateBindObj);

				}

			}




	}


</SCRIPT>
