.screen{

button{

button:hover{

#grid{

.card{

   box-shadow:0 4px 10px rgba(0,0,0,0.3);

.card.open{

}

}
.card:hover{

}
.card {

  z-index: 5;
}
.card.matched .back{

}

.inner{
  width:100%;
  height:100%;
  transition: transform 0.5s ease;
  transform-style:preserve-3d;

}

.card.open .inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;

<script>
window.onerror = function(msg, url, line){
  alert("HATA: " + msg + " | satır: " + line);
};

/* =====================
   GLOBAL
===================== */
let players = JSON.parse(localStorage.getItem("players")) || {};


let playerName = "Misafir";
  let level=1, score=0, combo=0, lives=3;
  let wrongStreak = 0;
let timeLeft=30, timer;
let gameMode = "add"; // add, sub, mul, div, mix
let cards=[];
let first=null, second=null;
let lock=false, matched=0;
let wrongCount = 0;
let progress = {
  add: 1,
  sub: 0,
  mul: 0,
  div: 0
};
let isGameOver = false;

let saved = JSON.parse(localStorage.getItem("progress"));
if(saved){
  progress = saved;
}
function rand(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* =====================
   SORU
===================== */
function createQuestion(){

  let min = 1;
  let max = level * 5;// 🔥 level ile artan zorluk

  let mode = gameMode;

  // 🔀 MIX MOD
  if(mode === "mix"){
    let modes = ["add","sub","mul","div"];
    let unlocked = modes.filter(m => isModeUnlocked(m));

    if(unlocked.length === 0){
      mode = "add";
    }else{
      mode = unlocked[Math.floor(Math.random() * unlocked.length)];
    }
  }

  let a, b;

  // ➕ TOPLAMA
  if(mode === "add"){
    a = rand(min, max);
    b = rand(min, max);
  }

  // ➖ ÇIKARMA
  else if(mode === "sub"){
    a = rand(min, max);
    b = rand(min, max);

    if(a < b){
      [a, b] = [b, a]; // negatif engelle
    }
  }

  // ✖ ÇARPMA
  else if(mode === "mul"){
    let m;

    if(level <= 2) m = 5;
    else if(level <= 4) m = 6;
    else if(level <= 6) m = 8;
    else m = 10;

    a = rand(1, m);
    b = rand(1, m);
  }

  // ➗ BÖLME
  else if(mode === "div"){
    let m = 5 + level;

    b = rand(1, m);
    a = b * rand(1, m); // tam bölünsün
  }

  return {a, b, mode};
}
function buildQuestion(a,b,mode){

  // ➕ TOPLAMA
  if(mode === "add"){
    return {q: `${a} + ${b}`, ans: a + b};
  }

  // ➖ ÇIKARMA
  if(mode === "sub"){
    return {q: `${a} - ${b}`, ans: a - b};
  }

  // ✖ ÇARPMA
  if(mode === "mul"){
    return {q: `${a} × ${b}`, ans: a * b};
  }

  // ➗ BÖLME
  if(mode === "div"){
    return {q: `${a} / ${b}`, ans: a / b};
    
  }
}
/* =====================
   KARTLAR
===================== */
function createCards(){

  let pairCount = level + 2;

  let arr = [];
  let used = new Set();

  for(let i=0; i<pairCount; i++){

    let q;
    let tries = 0;

    do{
      let nums = createQuestion();
      q = buildQuestion(nums.a, nums.b, nums.mode);
      tries++;
    }while(used.has(q.ans) && tries < 20);

    if(!q) continue;

    used.add(q.ans);

    arr.push({text:q.q, match:q.ans});
    arr.push({text:q.ans, match:q.q});
  }

  cards = arr.sort(()=>0.5 - Math.random());

  let cols = Math.ceil(Math.sqrt(pairCount * 2));
  document.getElementById("grid").style.gridTemplateColumns = `repeat(${cols},70px)`;
}
/* =====================
   RENDER
===================== */
function render(){

  let g=document.getElementById("grid");
  g.style.display = "grid";
  g.innerHTML="";

  cards.forEach(c=>{

    let d=document.createElement("div");
    d.className="card";

d.innerHTML=`
  <div class="inner">
    <div class="front"></div>
    <div class="back">${c.text}</div>
  </div>
`;

    d.onclick=()=>flip(d,c);

    g.appendChild(d);

    c.div = d;
  });
  
}

function flip(div,card){
    if(lock) return;
if(isGameOver) return;
  if(lock || div.classList.contains("open")) return;

  div.classList.add("open");

  if(!first){
    first = {div, card};
    return;
  }

  if(!second){
    second = {div, card};
    lock = true;

    setTimeout(check,500);
  }
}

function check(){
  if(isGameOver) return;

  let f = first;
  let s = second;

  let isMatch =
    String(f.card.match) === String(s.card.text) ||
    String(s.card.match) === String(f.card.text);

  // 🔥 EŞLEŞME VAR
  if(isMatch){

    f.div.classList.add("matched");
    s.div.classList.add("matched");

    matched += 2;
    combo++;
// 🔥 COMBO EFEKTİ
if(combo > 1){
  showScoreEffect("🔥 x" + combo);
}
    // ❤️ CAN BONUS (TEK YERDE)
    if((combo === 4 || combo === 7 || combo === 9) && lives < 5){
      lives++;
      updateLivesUI();
      showScoreEffect("+❤️");
    }

    wrongCount = 0;
updateWrongBar();

    // 🎯 PUAN
    let basePoint = getCardBasePoint(gameMode);
    let comboBonus = Math.min(combo * 5, 25);
    let gained = (basePoint + comboBonus) * level;

    score += gained;
    showScoreEffect("+" + gained);

    // 🎁 ÖZEL KART
    applySpecial(f.card.special);

    // 🏁 LEVEL BİTTİ
    if(matched === cards.length){

      setTimeout(()=>{

        let timeBonus = timeLeft * 5;
        let levelBonus = level * 50;

        score += timeBonus + levelBonus;

        showScoreEffect("+" + timeBonus + " ⏱️");
        showScoreEffect("+" + levelBonus + " ⭐");

        // 🔥 LEVEL SİSTEMİ
        let prev = progress[gameMode] || 1; // 🔥 eski level
level++;

let now = level;

progress[gameMode] = now;
checkUnlocks();
// 🔓 KİLİT AÇMA (LEVEL 3 BİTİNCE)
if(gameMode === "add" && prev < 3 && now === 4){
  showUnlock("Yeni kategori açıldı: Çıkarma!");
}

if(gameMode === "sub" && prev < 3 && now === 4){
  showUnlock("Yeni kategori açıldı: Çarpma!");
}

if(gameMode === "mul" && prev < 3 && now === 4){
  showUnlock("Yeni kategori açıldı: Bölme!");
}

localStorage.setItem("players", JSON.stringify(players));

//3 level = progress[gameMode];
updateLevelUI();
        showLevelPopup();
        updateCategoryUI();
        startLevel();

      },500);
    }

    // 🔥 RESET (eşleşme sonrası)
    first = null;
    second = null;
    lock = false;
  }

  // ❌ EŞLEŞME YOK
  else {

    lock = true;

    setTimeout(()=>{

      f.div.classList.remove("open");
      s.div.classList.remove("open");

      combo = 0;
            score -= 3;
      showScoreEffect("-3");

      wrongCount++;
updateWrongBar();

if(wrongCount >= 3){
  lives--;
  updateLivesUI();
  showScoreEffect("-❤️");

  wrongCount = 0;
  updateWrongBar();
}
      // ❤️ CAN AZALT


      // 💀 GAME OVER
      if(lives <= 0){
        first = null;
        second = null;
        lock = false;
        gameOver();
        return;
      }

      // 🔥 RESET
      first = null;
      second = null;
      lock = false;

    },800);

    return;
  }

  // 🔄 UI GÜNCELLE
  document.getElementById("score").innerText = "⭐ " + score;
  
}
function startLevel(){

  clearInterval(timer); // 🔥 eski timerı durdur

  cards = [];
  matched = 0;
  combo = 0;
  wrongCount = 0;

  let pairs = level + 2;

  createCards(pairs); // 🔥 önce kartlar

  // 🔥 sonra süre hesapla
  let timePerMatch = Math.max(9 - (level * 0.5), 5);
  timeLeft = Math.floor((cards.length / 2) * timePerMatch);

  updateTimeUI(); // 🔥 süreyi ekrana bas

  startTimer();   // 🔥 EN SON timer başlasın

  render();
}

function startGame(){

  // 🔥 ekranı aç
  showScreen("gameScreen");
  document.getElementById("gameOverScreen").style.display = "none";

  document.getElementById("playerNameText").innerText = playerName;

  // 🔥 oyun state reset
  resetGame();

  // 🔥 level başlat
  startLevel();

  document.getElementById("grid").style.display = "grid";

  console.log("START GAME");
}
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.style.display = "none";
  });

function applySpecial(type){

  if(!type) return;

  if(type === "plusTime") timeLeft += 5;
  if(type === "minusTime") timeLeft -= 5;

  if(type === "plusScore") score += 20;
  if(type === "minusScore") score -= 15;

  if(type === "plusCan"){
    if(lives < 4){
      lives++;
      updateLivesUI();
    }
  }

  if(type === "minusCan"){
    if(lives > 1){
      lives--;
      updateLivesUI();
    } else {
      timeLeft -= 5; // 🔥 SENİN İSTEDİĞİN
      if(timeLeft < 0) timeLeft = 0;
    }
  }
}

function saveScore(){

  let scores = JSON.parse(localStorage.getItem("scores")) || [];

  let newScore = {
    name: playerName,
    score: score,
    level: level,
    mode: gameMode,
    date: new Date().toLocaleDateString()
  };

  let existing = scores.find(s => s.name === playerName);

  if(existing){
    if(score > existing.score){
      existing.score = score;
      existing.level = level;
      existing.mode = gameMode;
      existing.date = newScore.date;
    }
  }else{
    scores.push(newScore);
  }

  scores.sort((a,b)=> b.score - a.score);
  scores = scores.slice(0,10);

  localStorage.setItem("scores", JSON.stringify(scores));
}

function renderLeaderboard(){

  let scores = JSON.parse(localStorage.getItem("scores")) || [];

  let html = "<h3>🏆 En İyi Skorlar</h3>";

  scores.forEach((s,i)=>{

    let medal = "";

    if(i === 0) medal = "🥇";
    else if(i === 1) medal = "🥈";
    else if(i === 2) medal = "🥉";
    else medal = (i+1) + ".";

    html += `
      <div class="scoreRow">
        <span class="rank">${medal}</span>
        <span class="name">${s.name}</span>
        <span class="date">${s.date}</span>
        <span class="mode">${modeName(s.mode)}</span>
        <span class="level">Lv${s.level}</span>
        <span class="score">⭐ ${s.score}</span>
      </div>
    `;

  });

  document.getElementById("leaderboard").innerHTML = html;
}

function setMode(mode){

  // 🔒 KİLİT KONTROL

  if(mode === "sub" && progress.add < 3){
    alert("Önce Toplama Level 3 olmalı!");
    return;
  }

  if(mode === "mul" && progress.sub < 3){
    alert("Önce Çıkarma Level 3 olmalı!");
    return;
  }

  if(mode === "div" && progress.mul < 3){
    alert("Önce Çarpma Level 3 olmalı!");
    return;
  }

  // 🔥 aynı mod seçildiyse boşuna restart yapma
  if(gameMode === mode){
    return;
  }

  gameMode = mode;

  const modeNames = {
    add: "Toplama",
    sub: "Çıkarma",
    mul: "Çarpma",
    div: "Bölme",
    mix: "Karışık"
  };

  let text = document.getElementById("modeText");

  if(text){
    text.innerText = "Mod: " + modeNames[mode];
  }

  // 🔥 kategori değişince oyun sıfırlansın
  startGame();

  console.log("Seçilen mod:", mode);
}

function isModeUnlocked(mode){

  // 🔥 oyuncu seçilmeden önce HER ŞEY KİLİTLİ (sadece toplama açık)
  if(!progress || Object.keys(progress).length === 0){
    return mode === "add";
  }

  let add = progress.add || 0;
  let sub = progress.sub || 0;
  let mul = progress.mul || 0;

  if(mode === "add") return true;
  if(mode === "sub") return add >= 4;
  if(mode === "mul") return sub >= 4;
  if(mode === "div") return mul >= 4;

  return false;
}
function checkUnlocks(){

  if(progress.add === 4){
    showUnlock("Yeni kategori açıldı: Çıkarma!");
  }

  if(progress.sub === 4){
    showUnlock("Yeni kategori açıldı: Çarpma!");
  }

  if(progress.mul === 4){
    showUnlock("Yeni kategori açıldı: Bölme!");
  }

}
function updateCategoryUI(){

  let map = {
    add: "btnAdd",
    sub: "btnSub",
    mul: "btnMul",
    div: "btnDiv"
  };

  for(let key in map){

    let btn = document.getElementById(map[key]);

    if(!btn) continue;

    if(!isModeUnlocked(key)){
      btn.classList.add("locked");
    }else{
      btn.classList.remove("locked");
    }
  }
}
